---
name: Auto
configs:
  Debug: debug
  Release: release
options:
  generateEmptyDirectories: true
  createIntermediateGroups: true
  developmentLanguage: en
  useBaseInternationalization: false
  usesTabs: false
  indentWidth: 4
  tabWidth: 4
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  groupOrdering:
    - order:
        - Auto
        - UI
        - Services
        - Localization
        - Tests
        - Frameworks
        - Products
settings:
  base:
    MARKETING_VERSION: "1.0"
    SPRINT_NUMBER: 1
    SPRINT_BUILD_NUMBER: 1
    CURRENT_PROJECT_VERSION: "1"
    VERSIONING_SYSTEM: apple-generic
    CODE_SIGN_STYLE: Manual
    SUPPORTS_MACCATALYST: "NO"
    OTHER_LDFLAGS: -lc++
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_TESTABILITY: YES
      ONLY_ACTIVE_ARCH: YES
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      SWIFT_OPTIMIZATION_LEVEL: -Onone
      VALIDATE_PRODUCT: false
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: RELEASE
      VALIDATE_PRODUCT: true
packages:
  Alamofire:
    url: https://github.com/Alamofire/Alamofire
    from: "5.10.2"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"
  SwinjectAutoregistration:
    url: https://github.com/Swinject/SwinjectAutoregistration
    from: "2.9.1"
targets:
  Auto:
    type: application
    platform: iOS
    dependencies:
      - target: UI
      - target: Services
      - target: Localization
      - package: SwinjectAutoregistration
        products:
          - Swinject
          - SwinjectAutoregistration
    sources:
      - Auto/Sources
      - Auto/Resources
    settings:
      base:
        INFOPLIST_FILE: Auto/Resources/Info.plist
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: false
        TARGETED_DEVICE_FAMILY: 1
      configs:
        Debug:
          CODE_SIGN_IDENTITY: iPhone Developer
          PRODUCT_BUNDLE_IDENTIFIER: com.dima.auto.debug
          PRODUCT_NAME: Auto
          DISPLAY_NAME: "$(PRODUCT_NAME) $(CURRENT_PROJECT_VERSION)"
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon Debug
        Release:
          CODE_SIGN_IDENTITY: iPhone Developer
          PRODUCT_BUNDLE_IDENTIFIER: com.dima.auto.debug
          PRODUCT_NAME: Auto
          DISPLAY_NAME: "$(PRODUCT_NAME)"
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  UI:
    templates:
      - Framework
    dependencies:
      - target: Services
      - target: Localization
    sources:
      - path: "${target_name}/Resources"
        name: Resources
    resources:
      - path: "${target_name}/Resources/Assets.xcassets"
        name: Assets
    preBuildScripts:
      - path: ShellScripts/BuildPhases/run_codegen.sh
        name: Run code generation
        basedOnDependencyAnalysis: true
        inputFiles:
          - "${target_name}/Resources/Assets.xcassets"
          - "${target_name}/swiftgen.yml"
        outputFiles:
          - "${target_name}/Sources/Generated/Assets.swift"
  Localization:
    templates:
      - Framework
    sources:
      - path: "${target_name}/Resources"
        name: Resources
    preBuildScripts:
      - path: ShellScripts/BuildPhases/run_codegen.sh
        name: Run code generation
        basedOnDependencyAnalysis: true
        inputFiles:
          - "${target_name}/Resources/Common.strings"
        outputFiles:
          - "${target_name}/Sources/Generated/Common.swift"
  Services:
    templates:
      - Framework
    sources:
      - ${target_name}/Resources
    dependencies:
      - package: Alamofire
      - package: KeychainAccess
  AutoUnitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/AutoUnitTests
    dependencies:
      - target: Auto
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dima.testapp.tests
        GENERATE_INFOPLIST_FILE: true
        # SWIFT_VERSION: 6
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Auto.app/Auto"
        BUNDLE_LOADER: "$(TEST_HOST)"
  AutoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/AutoUITests
    dependencies:
      - target: Auto
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dima.testapp.uitests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: Auto
schemes:
  Debug:
    templates:
      - ConfigBasedScheme
    build:
      targets:
        Auto: all
      config: Debug
    run:
      config: Debug
    profile:
      config: Debug
    analyze:
      config: Debug
    archive:
      config: Debug
  Release:
    templates:
      - ConfigBasedScheme
    build:
      targets:
        Auto: all
      config: Release
    run:
      config: Release
    profile:
      config: Release
    analyze:
      config: Release
    archive:
      config: Release
targetTemplates:
  Feature:
    platform: iOS
    sources:
      - path: "Features/${target_name}"
    type: framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.kode.framework.${target_name}
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: 6
    # preBuildScripts:
    #   - path: ShellScripts/BuildPhases/run_feature_linter.sh
    #     name: Run linter
    #     basedOnDependencyAnalysis: false
  Framework:
    platform: iOS
    sources:
      - path: "${target_name}/Sources"
        name: Sources
        excludes:
          - "**/*.md"
          - "**/*.command"
          - "**/*.yaml"
    type: framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dima.framework.${target_name}
        GENERATE_INFOPLIST_FILE: true
        # SWIFT_VERSION: 6
    # preBuildScripts:
    #   - path: ShellScripts/BuildPhases/run_linter.sh
    #     name: Run linter
    #     basedOnDependencyAnalysis: false
schemeTemplates:
  ConfigBasedScheme:
    test:
      gatherCoverageData: true
      targets:
        - name: AutoUnitTests
          parallelizable: false
        - name: AutoUITests
          parallelizable: false
directories:
  - Auto/Sources
  - Auto/Resources
  - UI/Sources
  - UI/Resources
  - Localization
  - Localization/Sources
  - Localization/Resources
  - Services/Sources
  - Services/Resources
  - Shared/Public
  - Tests/AutoUnitTests
  - Tests/AutoUITests
